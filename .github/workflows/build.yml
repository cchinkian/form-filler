name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build FormFiller.exe
        run: pyinstaller --onefile --windowed --name FormFiller --collect-all tkcalendar --collect-all babel --hidden-import babel.numbers src/main_app.py

      - name: Build CoordPicker.exe
        run: pyinstaller --onefile --windowed --name CoordPicker src/coord_picker.py

      - name: Stage portable bundle
        shell: cmd
        run: |
          mkdir bundle
          copy dist\FormFiller.exe bundle\
          copy dist\CoordPicker.exe bundle\
          xcopy /E /I config bundle\config
          xcopy /E /I data bundle\data
          if exist bundle\config\settings.json del bundle\config\settings.json
          copy bundle\config\settings.example.json bundle\config\settings.json
          if exist bundle\data\clients.xlsx del bundle\data\clients.xlsx

      - name: Create portable zip
        shell: powershell
        run: Compress-Archive -Path bundle\* -DestinationPath FormFiller-portable.zip -Force

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: FormFiller-portable
          path: FormFiller-portable.zip
