name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --windowed --name FormFillerTest green_test.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: FormFillerTest
          path: dist/FormFillerTest.exe
